name: Bug report
description: Report a reproducible problem with token-auditor
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not include session logs or other data that may contain sensitive prompts or paths.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest command or fixture that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0 or commit SHA"
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Python 3.14, uv 0.x"
